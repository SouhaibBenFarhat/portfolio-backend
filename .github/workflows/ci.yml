name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Django system checks
        run: python manage.py check
        env:
          SECRET_KEY: ci-secret

      - name: Migrations are up to date
        run: python manage.py makemigrations --check --dry-run
        env:
          SECRET_KEY: ci-secret

      - name: OpenAPI schema is up to date
        # Regenerate the committed spec and fail if it drifted from the code — the same
        # guard as the migrations check. The frontend generates its types from this file,
        # so a stale spec would ship wrong types.
        run: |
          python manage.py spectacular --file openapi.yaml --validate
          git diff --exit-code openapi.yaml
        env:
          SECRET_KEY: ci-secret
          DEBUG: "true"

      - name: Tests
        run: pytest -q
        env:
          SECRET_KEY: ci-secret
          DEBUG: "true"
