# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy: push this repo to GitHub, then in Render → "New +" → "Blueprint" → pick the repo.
services:
  - type: web
    name: portfolio-backend
    runtime: python
    plan: free
    region: frankfurt # EU, close to PostHog EU + the site's audience
    # Tests run as part of the build: if `pytest` fails, the build fails and Render keeps
    # the previous version live (deploys are gated on a green test suite). Dev deps are
    # installed because they include pytest; prod only ever runs gunicorn.
    # pytest runs with DEBUG=true so production's SECURE_SSL_REDIRECT doesn't 301 the
    # test client; collectstatic then runs with the ambient (production) env.
    buildCommand: "pip install -r requirements-dev.txt && DEBUG=true pytest -q && python manage.py collectstatic --noinput"
    # Async server (uvicorn worker) so streaming endpoints don't tie up a worker per
    # connection; sync endpoints still run fine (Django runs them in a threadpool).
    # --timeout 0 disables gunicorn's request timeout, which would otherwise kill
    # long-lived streams. migrate runs first so the DB schema is current on each deploy.
    # One async worker: uvicorn handles concurrency within it, and the heavy LLM
    # stack (litellm + langgraph + langchain) is loaded once — two copies OOM the
    # 512MB free instance, which returns 502s (that read as CORS errors in browsers).
    startCommand: "python manage.py migrate --noinput && gunicorn config.asgi:application -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --workers 1 --timeout 0"
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.0"
      - key: SECRET_KEY
        generateValue: true # Render generates a strong value, kept out of the repo
      - key: DEBUG
        value: "false"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://souhaibbenfarhat.github.io"
      - key: DATABASE_URL # Postgres connection string, injected from the DB below
        fromDatabase:
          name: portfolio-db
          property: connectionString
      - key: CHAT_MODEL # primary LiteLLM model; provider prefix picks the API key
        value: "groq/llama-3.3-70b-versatile"
      - key: CHAT_FALLBACK_MODEL # used if the primary model fails (quota/rate limit)
        value: "gemini/gemini-2.0-flash"
      - key: GROQ_API_KEY # secret — set the real value in the Render dashboard
        sync: false
      - key: GEMINI_API_KEY # secret — set the real value in the Render dashboard
        sync: false
      - key: GITHUB_USERNAME
        value: "SouhaibBenFarhat"
      - key: GITHUB_TOKEN # optional secret — lifts the GitHub API rate limit
        sync: false

# Managed Postgres for chat persistence (conversations, facts). Free plan.
# NOTE: Render's free Postgres expires after a limited window — to keep the DB
# permanent, either upgrade the plan or point DATABASE_URL at an external free
# Postgres (Neon, Supabase). The app reads DATABASE_URL, so switching is a one-var change.
databases:
  - name: portfolio-db
    plan: free
    region: frankfurt
