# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy: push this repo to GitHub, then in Render → "New +" → "Blueprint" → pick the repo.
services:
  - type: web
    name: portfolio-backend
    runtime: python
    plan: free
    region: frankfurt # EU, close to PostHog EU + the site's audience
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 60"
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.0"
      - key: SECRET_KEY
        generateValue: true # Render generates a strong value, kept out of the repo
      - key: DEBUG
        value: "false"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://souhaibbenfarhat.github.io"
