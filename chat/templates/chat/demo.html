<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chat streaming demo</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 640px;
        margin: 3rem auto;
        padding: 0 1rem;
        line-height: 1.5;
      }
      h1 { font-size: 1.25rem; }
      #reply {
        white-space: pre-wrap;
        border: 1px solid #ccc;
        border-radius: 8px;
        padding: 1rem;
        min-height: 6rem;
        margin-top: 1rem;
        background: #fafafa;
      }
      form { display: flex; gap: 0.5rem; }
      input { flex: 1; padding: 0.6rem; font-size: 1rem; }
      button { padding: 0.6rem 1rem; font-size: 1rem; cursor: pointer; }
      .muted { color: #888; font-size: 0.85rem; }
    </style>
  </head>
  <body>
    <h1>Chat streaming demo</h1>
    <p class="muted">Phase 1 — single model, streamed token by token. Dev/test page.</p>
    <form id="form">
      <input id="message" placeholder="Ask something…" autocomplete="off" required />
      <button type="submit">Send</button>
    </form>
    <div id="reply"></div>

    <script>
      const form = document.getElementById("form");
      const input = document.getElementById("message");
      const reply = document.getElementById("reply");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const message = input.value.trim();
        if (!message) return;
        reply.textContent = "";
        input.value = "";

        const res = await fetch("/chat/stream", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message }),
        });

        const readerDecoder = new TextDecoder();
        const reader = res.body.getReader();
        let buffer = "";

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += readerDecoder.decode(value, { stream: true });

          // Server-Sent Events frames are separated by a blank line.
          const frames = buffer.split("\n\n");
          buffer = frames.pop();
          for (const frame of frames) {
            const line = frame.replace(/^data: /, "").trim();
            if (!line) continue;
            const data = JSON.parse(line);
            if (data.text) reply.textContent += data.text;
            if (data.error) reply.textContent += "\n[error] " + data.error;
          }
        }
      });
    </script>
  </body>
</html>
